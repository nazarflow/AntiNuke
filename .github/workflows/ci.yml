# .github/workflows/ci.yml
# Continuous Integration pipeline for AntiNuke bot.
#
# Triggers: every push and pull-request to `main` or `develop`.
# Jobs:
#   1. lint   — syntax + import checks (fast, no external deps)
#   2. test   — pytest suite against in-memory SQLite (no Discord token needed)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ─── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Syntax & Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile all Python files
        run: python -m compileall src/ scripts/ main.py config.py -q

  # ─── Job 2: Tests ────────────────────────────────────────────────────────────
  test:
    name: Pytest Suite
    runs-on: ubuntu-latest
    needs: lint                # Only run if lint passes

    env:
      # In-memory SQLite for CI — no real database needed
      DATABASE_URL: sqlite+aiosqlite:///:memory:
      TOKEN: fake-token-for-testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
